sources:
  docker:
    type: docker_logs
    exclude_containers: ["observability-victorialogs-1", "vector"]

transforms:
  msg_parser:
    type: remap
    inputs: [docker]
    source: |
      ._msg = parse_json(.message) ?? .message

sinks:
  victorialogs:
    type: elasticsearch
    inputs:
      - msg_parser
    endpoints:
      - http://victorialogs:9428/insert/elasticsearch
    mode: bulk
    compression: gzip
