services:
  jupyter:
    build: .
    container_name: jupyterlab
    ports:
      - "8888:8888"

    environment:
      JUPYTER_ENABLE_LAB: "yes"

    volumes:
      - ./notebooks:/home/jovyan/work
      - ./data:/home/jovyan/data

    command:
      - start-notebook.py
      - --NotebookApp.token=''